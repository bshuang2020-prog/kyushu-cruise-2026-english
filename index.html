<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>九州郵輪旅行英文小護照</title>
<style>
:root{--navy:#21394e;--blue:#187bb8;--sky:#eaf7ff;--cream:#fffaf0;--ink:#27343b;--muted:#6b7a83;--gold:#f4b860;--shadow:0 8px 0 #24394b}
*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(180deg,#fff9eb,#fff4df);color:var(--ink);line-height:1.6}
header{background:linear-gradient(135deg,#ff7b55,#f04d49);color:#fff;padding:30px 20px 20px;position:relative;overflow:hidden}
header:after{content:"";position:absolute;width:190px;height:190px;border:4px dashed rgba(255,255,255,.22);border-radius:50%;right:-50px;top:-70px}
.hero{max-width:900px;margin:auto;position:relative;z-index:1}.hero h1{margin:0;font-size:clamp(30px,7vw,52px)}.hero p{margin:8px 0 0}
main{max-width:900px;margin:auto;padding:22px 18px 60px}
.page{display:none}.page.active{display:block}.back{display:inline-block;border:0;background:transparent;color:var(--navy);font-size:16px;font-weight:900;padding:8px 0;cursor:pointer}
.day-title{margin:10px 0 18px}.day-title h2{font-size:30px;margin:0;color:var(--navy)}.day-title p{margin:2px 0;color:var(--muted)}
.day-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.day-card,.cat-card{background:#fff;border:3px solid #344b5f;border-radius:22px;padding:18px;text-align:left;cursor:pointer;box-shadow:var(--shadow);transition:.15s}
.day-card:hover,.cat-card:hover{transform:translateY(-2px)}.day-card .icon{font-size:34px}.day-card h2{font-size:21px;margin:7px 0 3px;color:var(--navy)}.day-card p{margin:0;color:var(--muted)}
.cat-list{display:grid;gap:16px}.cat-card{display:flex;align-items:center;gap:16px;box-shadow:0 8px 0 #24394b}.cat-icon{font-size:42px;flex:none}.cat-card h3{margin:0;color:var(--navy);font-size:22px}.cat-card p{margin:2px 0 0;color:var(--muted)}.arrow{margin-left:auto;font-size:26px;color:#6d7c87}
.progress{background:var(--gold);border:2px solid #344b5f;border-radius:15px;padding:5px 10px;font-weight:900;white-space:nowrap}
.phrase-card{background:#fff;border:2px solid #d9d0bd;border-radius:20px;overflow:hidden;margin-bottom:16px}.phrase-head{padding:16px;background:#eef8ff}.phrase-head h3{margin:0;color:var(--navy)}.place{font-size:13px;color:var(--muted)}
.phrase{padding:16px;border-top:1px dashed #d8cfbc}.en{font-weight:900;color:#173b5a;font-size:18px}.zh{color:#66747c;margin-top:5px}.actions{display:flex;gap:8px;margin-top:10px}
button.speak,button.star{border:0;border-radius:12px;padding:9px 12px;font-weight:900;cursor:pointer}.speak{background:#e5f5ff;color:#126595}.star{background:#fff4d9;color:#976708}.star.done{background:#ffe6a7}
.notice{background:#fff3d8;border-left:5px solid var(--gold);padding:14px;border-radius:12px;margin-top:18px}
@media(max-width:700px){.day-grid{grid-template-columns:1fr}.day-title h2{font-size:27px}.cat-card h3{font-size:20px}}
</style></head><body>
<header><div class="hero"><h1>九州郵輪旅行英文小護照</h1><p>首頁選日期，進入後先選類別，再查看該類別英文。</p></div></header>
<main>
<section id="home" class="page active"><div class="day-grid" id="dayGrid"></div></section>
<section id="categories" class="page"><button class="back" onclick="showPage('home')">← 回到首頁</button><div class="day-title"><h2 id="dayTitle"></h2><p id="dayRoute"></p></div><div class="cat-list" id="catList"></div></section>
<section id="phrases" class="page"><button class="back" onclick="backToCategories()">← 回到類別</button><div class="day-title"><h2 id="catTitle"></h2><p id="catDesc"></p></div><div id="phraseContent"></div></section>
<div class="notice">點選「第幾天」後，會先看到類別方塊；再點類別才進入英文句子。</div>
</main>
<script>
const DATA=[{"id": "day1", "label": "第1天・7/4 基隆登船", "icon": "🚢", "date": "7/4（六）", "route": "基隆港 → 登船 → 啟航", "categories": [{"id": "checkin", "icon": "🛳️", "title": "登船報到與房卡", "desc": "報到、房卡、餐廳、行李", "phrases": [["We are a group of eight.", "我們一共有八位。"], ["Where is the check-in counter for MSC Bellissima?", "MSC 榮耀號的報到櫃檯在哪裡？"], ["Which restaurant and dining time are assigned to us?", "我們被安排在哪間餐廳、什麼用餐時段？"], ["Our luggage has not arrived yet. Could you check it for us?", "我們的行李還沒送到，可以幫我們查詢嗎？"]]}, {"id": "tickets", "icon": "🎫", "title": "確認日本下船號碼牌", "desc": "鹿兒島、宮崎、8人代領", "phrases": [["Do we need separate disembarkation tickets for Kagoshima and Miyazaki?", "鹿兒島與宮崎需要分別領下船號碼牌嗎？"], ["When and where can we collect the tickets?", "什麼時候、在哪裡可以領號碼牌？"], ["Can one person collect tickets for all eight of us?", "可以由一個人代領八人的號碼牌嗎？"], ["We have private transportation waiting at the port.", "我們在港口安排了私人包車。"], ["What is the earliest estimated time we can leave the ship?", "預計最早幾點可以離船？"]]}, {"id": "kids", "icon": "🧒", "title": "兒童俱樂部登記", "desc": "年齡分組、開放時間、接送", "phrases": [["We would like to register our child for the kids club.", "我們想幫孩子登記兒童俱樂部。"], ["Which age group should my child join?", "我的孩子應該參加哪個年齡組？"], ["What time does the club open and close?", "兒童俱樂部幾點開放、幾點結束？"], ["Can parents leave while the child is here?", "孩子在這裡時，家長可以離開嗎？"]]}]}, {"id": "day2", "label": "第2天・7/5 海上巡航", "icon": "🏊", "date": "7/5（日）", "route": "水上設施 → 娛樂 → 正式晚餐", "categories": [{"id": "pool", "icon": "🌊", "title": "泳池與水上樂園", "desc": "開放、身高限制、毛巾", "phrases": [["Is the water park open now?", "水上樂園現在有開放嗎？"], ["Is there a height requirement for this slide?", "這個滑水道有身高限制嗎？"], ["Where can we get pool towels?", "哪裡可以拿泳池毛巾？"], ["What time is the least crowded?", "什麼時段人比較少？"]]}, {"id": "games", "icon": "🏎️", "title": "預約付費娛樂", "desc": "F1、Fun Pass、預約", "phrases": [["How much is the Formula One simulator?", "F1 模擬器一次多少錢？"], ["Do we need to make a reservation?", "需要預約嗎？"], ["Is this included in the Fun Pass?", "這個有包含在 Fun Pass 裡嗎？"], ["We would like to book two sessions.", "我們想預約兩個場次。"]]}, {"id": "dining", "icon": "🍽️", "title": "船上主餐廳", "desc": "8人同桌、兒童餐、加點", "phrases": [["We have a reservation for eight people.", "我們有八位的訂位。"], ["Could we sit at the same table?", "我們可以坐在同一桌嗎？"], ["Could you make this less salty for the child?", "可以幫孩子做得清淡一點嗎？"], ["May we order another main course?", "我們可以再點一份主餐嗎？"]]}]}, {"id": "day3", "label": "第3天・7/6 鹿兒島", "icon": "🏯", "date": "7/6（一）", "route": "港口 → 仙巖園 → 天文館 → 中央站", "categories": [{"id": "driver", "icon": "🚐", "title": "與包車司機會合", "desc": "延誤、出口、回港時間", "phrases": [["Hello, we are the passengers from MSC Bellissima.", "您好，我們是 MSC 榮耀號的旅客。"], ["We may be delayed because of immigration procedures.", "我們可能會因入境查驗而延遲。"], ["Could you please wait for us near the terminal exit?", "可以請您在航廈出口附近等我們嗎？"], ["We must return to the port by 4:50 p.m.", "我們必須在下午4:50前回到港口。"]]}, {"id": "sengan", "icon": "🌳", "title": "仙巖園與景點", "desc": "停留時間、入口、拍照", "phrases": [["How long do we have at this stop?", "這一站可以停留多久？"], ["Where is the entrance to the garden?", "庭園入口在哪裡？"], ["Could you take a family photo for us?", "可以幫我們拍一張全家福嗎？"]]}, {"id": "shopping", "icon": "🛍️", "title": "天文館與購物", "desc": "伴手禮、信用卡、包裝", "phrases": [["Is this souvenir made in Kagoshima?", "這個伴手禮是鹿兒島製造的嗎？"], ["Can I pay by credit card?", "可以刷信用卡嗎？"], ["Could you pack these separately?", "可以幫我分開包裝嗎？"]]}]}, {"id": "day4", "label": "第4天・7/7 宮崎", "icon": "🌊", "date": "7/7（二）", "route": "油津港 → 太陽花園 → 青島 → 永旺", "categories": [{"id": "driver", "icon": "🚐", "title": "油津港包車會合", "desc": "下船延誤、訊息、回港", "phrases": [["Our ship arrives at seven, but disembarkation may take some time.", "郵輪七點抵達，但下船可能需要一些時間。"], ["We will message you as soon as we leave the ship.", "我們一下船就會立刻傳訊息給您。"], ["Please take us to Sun Messe Nichinan first.", "請先帶我們去日南太陽花園。"], ["Can we adjust the schedule if it rains?", "如果下雨，可以調整行程嗎？"], ["Please make sure we return to the port with enough time.", "請務必預留充足時間讓我們回港。"]]}, {"id": "aoshima", "icon": "⛩️", "title": "青島與海岸景點", "desc": "濕滑、長輩路線、神社", "phrases": [["Is the path slippery today?", "今天步道會不會很滑？"], ["Is there an easier route for an older person?", "有比較適合長輩走的路線嗎？"], ["How far is it to the shrine?", "走到神社有多遠？"], ["Could we have ten more minutes here?", "我們可以在這裡多停留十分鐘嗎？"]]}, {"id": "mall", "icon": "🛒", "title": "一番街與永旺", "desc": "用餐、退稅、超市", "phrases": [["Where can we try chicken nanban?", "哪裡可以吃到雞肉南蠻？"], ["Is there a table for eight people?", "有八人的座位嗎？"], ["Where is the tax-free counter?", "退稅櫃檯在哪裡？"], ["Can this be taken back to Taiwan?", "這個可以帶回台灣嗎？"]]}]}, {"id": "day5", "label": "第5天・7/8 海上巡航", "icon": "🧳", "date": "7/8（三）", "route": "補玩 → 帳單 → 行李整理", "categories": [{"id": "bill", "icon": "🧾", "title": "帳單與費用", "desc": "查帳、異常費用", "phrases": [["Could you help me check this charge on my account?", "可以幫我查一下帳單上的這筆費用嗎？"], ["I don't recognize this charge.", "我不認得這筆費用。"]]}, {"id": "luggage", "icon": "🧳", "title": "托運行李", "desc": "放門外、行李吊牌、隨身物品", "phrases": [["What time should we place our luggage outside the cabin?", "我們幾點前要把行李放到房門外？"], ["Where can we get luggage tags?", "哪裡可以拿行李吊牌？"], ["Which items must stay in our carry-on bag?", "哪些物品一定要留在隨身包？"]]}, {"id": "tomorrow", "icon": "⏰", "title": "確認明天下船", "desc": "下船時間、集合地點", "phrases": [["What is our disembarkation time tomorrow?", "我們明天的下船時間是幾點？"], ["Where should we wait for our group?", "我們應該在哪裡等同行者？"]]}]}, {"id": "day6", "label": "第6天・7/9 基隆下船", "icon": "⚓", "date": "7/9（四）", "route": "早餐 → 離船 → 領行李 → 回家", "categories": [{"id": "exit", "icon": "🚪", "title": "離船出口", "desc": "出口、叫號、集合", "phrases": [["Which exit should we use?", "我們應該走哪個出口？"], ["We are waiting for the rest of our group.", "我們正在等其他同行者。"]]}, {"id": "bags", "icon": "🛄", "title": "尋找行李", "desc": "顏色區、行李遺失", "phrases": [["Where is the luggage area for this color tag?", "這個顏色吊牌的行李區在哪裡？"], ["One of our bags is missing.", "我們有一件行李不見了。"], ["Could you help us contact the luggage desk?", "可以幫我們聯絡行李服務櫃檯嗎？"]]}]}, {"id": "emergency", "label": "緊急狀況", "icon": "🆘", "date": "任何時間", "route": "走失、身體不適、延遲回船", "categories": [{"id": "missing", "icon": "👶", "title": "孩子或同行者走失", "desc": "走失、分散", "phrases": [["My child is missing. Please help us.", "我的孩子走失了，請幫忙。"], ["We are separated from our group.", "我們和同行者走散了。"]]}, {"id": "medical", "icon": "🏥", "title": "身體不適", "desc": "頭暈、醫療中心", "phrases": [["I feel dizzy and need medical assistance.", "我覺得頭暈，需要醫療協助。"], ["Where is the ship's medical center?", "船上的醫療中心在哪裡？"]]}, {"id": "late", "icon": "⚠️", "title": "可能延遲回船", "desc": "聯絡港口代理", "phrases": [["We may be late returning to the ship.", "我們可能會延遲回到郵輪。"], ["Please contact the port agent immediately.", "請立即聯絡港口代理。"]]}]}];
let currentDay=null;
const learned=new Set(JSON.parse(localStorage.getItem('cruiseEnglishHierarchy')||'[]'));
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function renderHome(){dayGrid.innerHTML=DATA.map(d=>`<button class="day-card" onclick="openDay('${d.id}')"><div class="icon">${d.icon}</div><h2>${d.label}</h2><p>${d.route}</p></button>`).join('')}
function openDay(id){currentDay=DATA.find(d=>d.id===id);dayTitle.textContent=currentDay.icon+' '+currentDay.label;dayRoute.textContent=currentDay.date+'｜'+currentDay.route;catList.innerHTML=currentDay.categories.map(c=>{const total=c.phrases.length;const done=c.phrases.filter((_,i)=>learned.has(currentDay.id+'-'+c.id+'-'+i)).length;return `<button class="cat-card" onclick="openCategory('${c.id}')"><div class="cat-icon">${c.icon}</div><div><h3>${c.title}</h3><p>${c.desc}・${total}句</p></div><div class="progress">${done}/${total}</div><div class="arrow">›</div></button>`}).join('');showPage('categories')}
function openCategory(id){const c=currentDay.categories.find(x=>x.id===id);catTitle.textContent=c.icon+' '+c.title;catDesc.textContent=currentDay.label+'｜'+c.desc;phraseContent.innerHTML=`<article class="phrase-card"><div class="phrase-head"><h3>${c.title}</h3><div class="place">${currentDay.label}</div></div>${c.phrases.map((p,i)=>{const pid=currentDay.id+'-'+c.id+'-'+i;return `<div class="phrase"><div class="en" onclick='speak(${JSON.stringify(p[0])})'>${p[0]}</div><div class="zh">${p[1]}</div><div class="actions"><button class="speak" onclick='speak(${JSON.stringify(p[0])})'>🔊 播放</button><button class="star ${learned.has(pid)?'done':''}" data-id="${pid}" onclick="mark(this)">⭐ ${learned.has(pid)?'已學會':'標記'}</button></div></div>`}).join('')}</article>`;showPage('phrases')}
function backToCategories(){openDay(currentDay.id)}
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.82;speechSynthesis.speak(u)}
function mark(btn){const id=btn.dataset.id;if(learned.has(id))learned.delete(id);else learned.add(id);localStorage.setItem('cruiseEnglishHierarchy',JSON.stringify([...learned]));btn.classList.toggle('done');btn.textContent=learned.has(id)?'⭐ 已學會':'⭐ 標記'}
renderHome();
</script></body></html>
